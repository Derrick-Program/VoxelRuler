[package]
name = "voxelruler"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
minecraft-msa-auth = "0.4.0"
oauth2 = { version = "5.0.0", features = ["reqwest"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
url = "2"
slint = "1.16.1"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }

[profile.release]
codegen-units = 1
lto = true

[build-dependencies]
slint-build = "1.16.1"
